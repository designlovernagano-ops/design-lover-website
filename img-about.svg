  <rect x="14" y="14" width="772" height="372" stroke="#B8976A" stroke-width="0.4" opacity="0.3" fill="none"/>

  <!-- Isometric grid (subtle) -->
  <line x1="14" y1="50"  x2="786" y2="50"  stroke="#B8976A" stroke-width="0.25" opacity="0.12"/>
  <line x1="14" y1="86"  x2="786" y2="86"  stroke="#B8976A" stroke-width="0.25" opacity="0.12"/>
  <line x1="14" y1="122" x2="786" y2="122" stroke="#B8976A" stroke-width="0.25" opacity="0.12"/>
  <line x1="14" y1="158" x2="786" y2="158" stroke="#B8976A" stroke-width="0.25" opacity="0.12"/>
  <line x1="14" y1="194" x2="786" y2="194" stroke="#B8976A" stroke-width="0.25" opacity="0.12"/>
  <line x1="14" y1="230" x2="786" y2="230" stroke="#B8976A" stroke-width="0.25" opacity="0.12"/>
  <line x1="14" y1="266" x2="786" y2="266" stroke="#B8976A" stroke-width="0.25" opacity="0.12"/>
  <line x1="14" y1="302" x2="786" y2="302" stroke="#B8976A" stroke-width="0.25" opacity="0.12"/>
  <line x1="14" y1="338" x2="786" y2="338" stroke="#B8976A" stroke-width="0.25" opacity="0.12"/>
  <!-- Iso 30deg right-down -->
  <line x1="14"  y1="14"  x2="786" y2="461" stroke="#B8976A" stroke-width="0.2" opacity="0.09"/>
  <line x1="80"  y1="14"  x2="786" y2="399" stroke="#B8976A" stroke-width="0.2" opacity="0.09"/>
  <line x1="146" y1="14"  x2="786" y2="337" stroke="#B8976A" stroke-width="0.2" opacity="0.09"/>
  <line x1="212" y1="14"  x2="786" y2="275" stroke="#B8976A" stroke-width="0.2" opacity="0.09"/>
  <line x1="278" y1="14"  x2="786" y2="213" stroke="#B8976A" stroke-width="0.2" opacity="0.09"/>
  <line x1="344" y1="14"  x2="786" y2="151" stroke="#B8976A" stroke-width="0.2" opacity="0.09"/>
  <line x1="410" y1="14"  x2="786" y2="89"  stroke="#B8976A" stroke-width="0.2" opacity="0.09"/>
  <line x1="476" y1="14"  x2="786" y2="27"  stroke="#B8976A" stroke-width="0.2" opacity="0.09"/>
  <line x1="14"  y1="76"  x2="652" y2="461" stroke="#B8976A" stroke-width="0.2" opacity="0.09"/>
  <line x1="14"  y1="138" x2="587" y2="461" stroke="#B8976A" stroke-width="0.2" opacity="0.09"/>
  <line x1="14"  y1="200" x2="522" y2="461" stroke="#B8976A" stroke-width="0.2" opacity="0.09"/>
  <line x1="14"  y1="262" x2="457" y2="461" stroke="#B8976A" stroke-width="0.2" opacity="0.09"/>
  <line x1="14"  y1="324" x2="392" y2="461" stroke="#B8976A" stroke-width="0.2" opacity="0.09"/>
  <!-- Iso 30deg left-down -->
  <line x1="786" y1="14"  x2="14"  y2="461" stroke="#B8976A" stroke-width="0.2" opacity="0.09"/>
  <line x1="720" y1="14"  x2="14"  y2="399" stroke="#B8976A" stroke-width="0.2" opacity="0.09"/>
  <line x1="654" y1="14"  x2="14"  y2="337" stroke="#B8976A" stroke-width="0.2" opacity="0.09"/>
  <line x1="588" y1="14"  x2="14"  y2="275" stroke="#B8976A" stroke-width="0.2" opacity="0.09"/>
  <line x1="522" y1="14"  x2="14"  y2="213" stroke="#B8976A" stroke-width="0.2" opacity="0.09"/>
  <line x1="456" y1="14"  x2="14"  y2="151" stroke="#B8976A" stroke-width="0.2" opacity="0.09"/>
  <line x1="390" y1="14"  x2="14"  y2="89"  stroke="#B8976A" stroke-width="0.2" opacity="0.09"/>
  <line x1="324" y1="14"  x2="14"  y2="27"  stroke="#B8976A" stroke-width="0.2" opacity="0.09"/>
  <line x1="786" y1="76"  x2="148" y2="461" stroke="#B8976A" stroke-width="0.2" opacity="0.09"/>
  <line x1="786" y1="138" x2="213" y2="461" stroke="#B8976A" stroke-width="0.2" opacity="0.09"/>
  <line x1="786" y1="200" x2="278" y2="461" stroke="#B8976A" stroke-width="0.2" opacity="0.09"/>
  <line x1="786" y1="262" x2="343" y2="461" stroke="#B8976A" stroke-width="0.2" opacity="0.09"/>
  <line x1="786" y1="324" x2="408" y2="461" stroke="#B8976A" stroke-width="0.2" opacity="0.09"/>

  <!-- ======================================================
       ISOMETRIC EXPLODED ASSEMBLY
       Center: 400,220. Unit=52px, iso x-vec=(0.866,0.5), y-vec=(-0.866,0.5), z-vec=(0,-1)
  ====================================================== -->

  <!-- PART 1: BASE PLATE (bottom, exploded downward) -->
  <!-- Top face: rhombus 4u x 3u centered at 400,320 -->
  <polygon points="400,306 607,253 607,280 400,333 193,280 193,253"
           stroke="#1C1C1C" stroke-width="1.0" fill="rgba(28,28,28,0.03)"/>
  <!-- Right face -->
  <polygon points="607,253 607,280 400,333 400,306" stroke="#1C1C1C" stroke-width="1.0" fill="rgba(28,28,28,0.06)"/>
  <!-- Left face -->
  <polygon points="193,253 193,280 400,333 400,306" stroke="#1C1C1C" stroke-width="1.0" fill="rgba(28,28,28,0.02)"/>
  <!-- Mounting holes on top -->
  <ellipse cx="240" cy="263" rx="7" ry="4" stroke="#B8976A" stroke-width="0.8" fill="none" opacity="0.6"/>
  <ellipse cx="560" cy="263" rx="7" ry="4" stroke="#B8976A" stroke-width="0.8" fill="none" opacity="0.6"/>
  <ellipse cx="320" cy="293" rx="7" ry="4" stroke="#B8976A" stroke-width="0.8" fill="none" opacity="0.55"/>
  <ellipse cx="480" cy="293" rx="7" ry="4" stroke="#B8976A" stroke-width="0.8" fill="none" opacity="0.55"/>
  <!-- T-slots on top -->
  <line x1="230" y1="269" x2="550" y2="269" stroke="#1C1C1C" stroke-width="0.5" stroke-dasharray="4,3" opacity="0.22"/>
  <line x1="310" y1="299" x2="490" y2="299" stroke="#1C1C1C" stroke-width="0.5" stroke-dasharray="4,3" opacity="0.22"/>
  <!-- Part label -->
  <line x1="625" y1="267" x2="680" y2="267" stroke="#B8976A" stroke-width="0.5" opacity="0.65"/>
  <text x="684" y="270" font-family="DM Sans,sans-serif" font-size="8" fill="#B8976A" opacity="0.85" letter-spacing="0.5">① BASE PLATE</text>
  <!-- Bubble -->
  <circle cx="680" cy="267" r="7" stroke="#B8976A" stroke-width="0.7" fill="rgba(247,245,240,0.9)" opacity="0.85"/>
  <text x="680" y="270" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="7" fill="#B8976A">1</text>
  <!-- Explosion dashed line -->
  <line x1="400" y1="250" x2="400" y2="200" stroke="#B8976A" stroke-width="0.5" stroke-dasharray="4,3" opacity="0.35"/>

  <!-- PART 2: BODY BLOCK (middle) -->
  <!-- Top face centered ~400,185 -->
  <polygon points="400,172 504,118 504,145 400,199 296,145 296,118"
           stroke="#1C1C1C" stroke-width="1.0" fill="rgba(28,28,28,0.04)"/>
  <!-- Right face, height ~80px -->
  <polygon points="504,118 504,145 400,199 400,172" stroke="#1C1C1C" stroke-width="1.0" fill="rgba(28,28,28,0.07)"/>
  <!-- Left face -->
  <polygon points="296,118 296,145 400,199 400,172" stroke="#1C1C1C" stroke-width="1.0" fill="rgba(28,28,28,0.025)"/>
  <!-- Pocket on top -->
  <polygon points="340,172 400,140 460,172 400,204" stroke="#1C1C1C" stroke-width="0.6" stroke-dasharray="3,2" fill="rgba(184,151,106,0.05)" opacity="0.5"/>
  <!-- Through bore on right face -->
  <ellipse cx="460" cy="158" rx="10" ry="6" stroke="#1C1C1C" stroke-width="0.8" fill="none" opacity="0.5"/>
  <!-- Hidden bore opposite -->
  <ellipse cx="340" cy="158" rx="10" ry="6" stroke="#1C1C1C" stroke-width="0.5" stroke-dasharray="2,2" fill="none" opacity="0.3"/>
  <!-- Part label -->
  <line x1="520" y1="155" x2="575" y2="155" stroke="#B8976A" stroke-width="0.5" opacity="0.65"/>
  <text x="587" y="158" font-family="DM Sans,sans-serif" font-size="8" fill="#B8976A" opacity="0.85" letter-spacing="0.5">② BODY BLOCK</text>
  <circle cx="575" cy="155" r="7" stroke="#B8976A" stroke-width="0.7" fill="rgba(247,245,240,0.9)" opacity="0.85"/>
  <text x="575" y="158" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="7" fill="#B8976A">2</text>
  <!-- Explosion line up -->
  <line x1="400" y1="118" x2="400" y2="75" stroke="#B8976A" stroke-width="0.5" stroke-dasharray="4,3" opacity="0.35"/>

  <!-- PART 3: TOP BRACKET (gold tinted, exploded up) -->
  <!-- Top face centered ~400,68 -->
  <polygon points="400,60 470,24 470,47 400,83 330,47 330,24"
           stroke="#1C1C1C" stroke-width="1.0" fill="rgba(184,151,106,0.10)"/>
  <!-- Right face height ~30px -->
  <polygon points="470,24 470,47 400,83 400,60" stroke="#1C1C1C" stroke-width="1.0" fill="rgba(184,151,106,0.15)"/>
  <!-- Left face -->
  <polygon points="330,24 330,47 400,83 400,60" stroke="#1C1C1C" stroke-width="1.0" fill="rgba(184,151,106,0.07)"/>
  <!-- Center bore -->
  <ellipse cx="400" cy="60" rx="16" ry="9" stroke="#B8976A" stroke-width="1.0" fill="none" opacity="0.75"/>
  <ellipse cx="400" cy="60" rx="7"  ry="4" stroke="#1C1C1C" stroke-width="0.6" stroke-dasharray="2,2" fill="none" opacity="0.4"/>
  <!-- Flange ears -->
  <line x1="330" y1="24" x2="310" y2="35" stroke="#1C1C1C" stroke-width="0.8" opacity="0.5"/>
  <line x1="310" y1="35" x2="310" y2="58" stroke="#1C1C1C" stroke-width="0.8" opacity="0.5"/>
  <line x1="310" y1="58" x2="330" y2="47" stroke="#1C1C1C" stroke-width="0.8" opacity="0.5"/>
  <line x1="470" y1="24" x2="490" y2="35" stroke="#1C1C1C" stroke-width="0.8" opacity="0.5"/>
  <line x1="490" y1="35" x2="490" y2="58" stroke="#1C1C1C" stroke-width="0.8" opacity="0.5"/>
  <line x1="490" y1="58" x2="470" y2="47" stroke="#1C1C1C" stroke-width="0.8" opacity="0.5"/>
  <polygon points="310,35 330,24 470,24 490,35 470,35 330,35" stroke="#1C1C1C" stroke-width="0.6" fill="rgba(184,151,106,0.07)" opacity="0.7"/>
  <!-- Part label -->
  <line x1="494" y1="46" x2="545" y2="46" stroke="#B8976A" stroke-width="0.5" opacity="0.65"/>
  <text x="557" y="49" font-family="DM Sans,sans-serif" font-size="8" fill="#B8976A" opacity="0.85" letter-spacing="0.5">③ COVER BRACKET</text>
  <circle cx="545" cy="46" r="7" stroke="#B8976A" stroke-width="0.7" fill="rgba(247,245,240,0.9)" opacity="0.85"/>
  <text x="545" y="49" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="7" fill="#B8976A">3</text>

  <!-- PART 4: SHAFT / PIN (left side, exploded outward) -->
  <!-- Isometric cylinder, vertical axis, at left -->
  <ellipse cx="158" cy="135" rx="12" ry="7" stroke="#1C1C1C" stroke-width="0.9" fill="rgba(184,151,106,0.12)"/>
  <line x1="146" y1="135" x2="146" y2="215" stroke="#1C1C1C" stroke-width="0.9" opacity="0.7"/>
  <line x1="170" y1="135" x2="170" y2="215" stroke="#1C1C1C" stroke-width="0.9" opacity="0.7"/>
  <ellipse cx="158" cy="215" rx="12" ry="7" stroke="#1C1C1C" stroke-width="0.6" stroke-dasharray="3,2" fill="rgba(28,28,28,0.04)" opacity="0.5"/>
  <!-- Keyway on shaft -->
  <rect x="155" y="140" width="6" height="40" fill="rgba(28,28,28,0.1)" opacity="0.6" rx="1"/>
  <!-- Shoulder -->
  <ellipse cx="158" cy="165" rx="16" ry="9" stroke="#1C1C1C" stroke-width="0.7" fill="rgba(28,28,28,0.04)" opacity="0.5"/>
  <!-- Shaft label -->
  <line x1="128" y1="175" x2="88" y2="175" stroke="#B8976A" stroke-width="0.5" opacity="0.65"/>
  <text x="84" y="162" text-anchor="end" font-family="DM Sans,sans-serif" font-size="8" fill="#B8976A" opacity="0.85" letter-spacing="0.5">④ DRIVE</text>
  <text x="84" y="173" text-anchor="end" font-family="DM Sans,sans-serif" font-size="8" fill="#B8976A" opacity="0.85" letter-spacing="0.5">SHAFT</text>
  <circle cx="88" cy="175" r="7" stroke="#B8976A" stroke-width="0.7" fill="rgba(247,245,240,0.9)" opacity="0.85"/>
  <text x="88" y="178" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="7" fill="#B8976A">4</text>
  <!-- Explosion dashed to body -->
  <line x1="170" y1="175" x2="296" y2="158" stroke="#B8976A" stroke-width="0.5" stroke-dasharray="4,3" opacity="0.35"/>

  <!-- FASTENERS: 3 M8 hex bolts (small) lower-left area -->
  <!-- Bolt A -->
  <polygon points="106,290 118,283 118,298 106,305" stroke="#1C1C1C" stroke-width="0.7" fill="rgba(28,28,28,0.06)"/>
  <ellipse cx="112" cy="290" rx="7" ry="4" stroke="#1C1C1C" stroke-width="0.7" fill="rgba(184,151,106,0.12)"/>
  <!-- Bolt B -->
  <polygon points="128,305 140,298 140,313 128,320" stroke="#1C1C1C" stroke-width="0.7" fill="rgba(28,28,28,0.06)"/>
  <ellipse cx="134" cy="305" rx="7" ry="4" stroke="#1C1C1C" stroke-width="0.7" fill="rgba(184,151,106,0.12)"/>
  <!-- Bolt C -->
  <polygon points="150,320 162,313 162,328 150,335" stroke="#1C1C1C" stroke-width="0.7" fill="rgba(28,28,28,0.06)"/>
  <ellipse cx="156" cy="320" rx="7" ry="4" stroke="#1C1C1C" stroke-width="0.7" fill="rgba(184,151,106,0.12)"/>
  <!-- Fastener label -->
  <line x1="100" y1="297" x2="70" y2="310" stroke="#B8976A" stroke-width="0.5" opacity="0.65"/>
  <text x="65" y="308" text-anchor="end" font-family="DM Sans,sans-serif" font-size="8" fill="#B8976A" opacity="0.85">⑤ M8 HEX ×3</text>
  <circle cx="70" cy="310" r="7" stroke="#B8976A" stroke-width="0.7" fill="rgba(247,245,240,0.9)" opacity="0.85"/>
  <text x="70" y="313" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="7" fill="#B8976A">5</text>

  <!-- DIMENSION ANNOTATIONS -->
  <!-- Total width of base -->
  <line x1="193" y1="350" x2="607" y2="350" stroke="#B8976A" stroke-width="0.7" opacity="0.55"/>
  <line x1="193" y1="344" x2="193" y2="356" stroke="#B8976A" stroke-width="0.7" opacity="0.55"/>
  <line x1="607" y1="344" x2="607" y2="356" stroke="#B8976A" stroke-width="0.7" opacity="0.55"/>
  <text x="400" y="367" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="8" fill="#B8976A" opacity="0.75" letter-spacing="1">240.0mm</text>

  <!-- Bore callout -->
  <line x1="400" y1="56" x2="400" y2="30" stroke="#B8976A" stroke-width="0.6" opacity="0.5"/>
  <line x1="370" y1="30" x2="430" y2="30" stroke="#B8976A" stroke-width="0.6" opacity="0.5"/>
  <text x="434" y="33" font-family="DM Sans,sans-serif" font-size="8" fill="#B8976A" opacity="0.75">Ø32 H7</text>

  <!-- Right height dim -->
  <line x1="640" y1="118" x2="640" y2="253" stroke="#B8976A" stroke-width="0.7" opacity="0.5"/>
  <line x1="634" y1="118" x2="646" y2="118" stroke="#B8976A" stroke-width="0.7" opacity="0.5"/>
  <line x1="634" y1="253" x2="646" y2="253" stroke="#B8976A" stroke-width="0.7" opacity="0.5"/>
  <text x="652" y="190" font-family="DM Sans,sans-serif" font-size="8" fill="#B8976A" opacity="0.7" letter-spacing="0.5">135.0</text>

  <!-- TITLE BLOCK -->
  <rect x="14" y="350" width="340" height="36" stroke="#B8976A" stroke-width="0.4" fill="rgba(184,151,106,0.03)" opacity="0.7"/>
  <line x1="170" y1="350" x2="170" y2="386" stroke="#B8976A" stroke-width="0.4" opacity="0.4"/>
  <line x1="14"  y1="366" x2="354" y2="366" stroke="#B8976A" stroke-width="0.4" opacity="0.3"/>
  <text x="92"  y="361" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="7" fill="#1C1C1C" opacity="0.5" letter-spacing="1">DESIGN LOVER — 長野</text>
  <text x="262" y="361" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="7" fill="#B8976A" opacity="0.75" letter-spacing="1">DL-2024-ASM-003</text>
  <text x="92"  y="380" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="6.5" fill="#1C1C1C" opacity="0.35" letter-spacing="1">EXPLODED ASSEMBLY — ISO VIEW</text>
  <text x="262" y="374" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="6.5" fill="#1C1C1C" opacity="0.3">SCALE 1:2.5  /  SolidWorks 2024</text>

  <!-- Rev triangle -->
  <polygon points="762,350 786,350 786,374" stroke="#B8976A" stroke-width="0.5" fill="rgba(184,151,106,0.06)" opacity="0.6"/>
  <text x="779" y="369" font-family="DM Sans,sans-serif" font-size="7" fill="#B8976A" opacity="0.7">A</text>
</svg>
