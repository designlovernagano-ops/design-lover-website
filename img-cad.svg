<svg viewBox="0 0 400 260" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="260" fill="#F7F5F0"/>
  <rect x="12" y="12" width="376" height="236" stroke="#1C1C1C" stroke-width="0.5" opacity="0.12" fill="none"/>
  <rect x="16" y="16" width="368" height="228" stroke="#B8976A" stroke-width="0.3" opacity="0.25" fill="none"/>

  <!-- Monitor body -->
  <rect x="36" y="18" width="328" height="208" rx="5" stroke="#1C1C1C" stroke-width="1.3" fill="rgba(28,28,28,0.03)"/>
  <!-- Screen area -->
  <rect x="46" y="26" width="308" height="180" rx="2" fill="rgba(28,28,28,0.045)" stroke="#1C1C1C" stroke-width="0.5" opacity="0.5"/>
  <!-- Monitor stand -->
  <rect x="174" y="226" width="52" height="14" stroke="#1C1C1C" stroke-width="0.8" fill="rgba(28,28,28,0.04)"/>
  <line x1="142" y1="240" x2="258" y2="240" stroke="#1C1C1C" stroke-width="0.8" opacity="0.35"/>

  <!-- Menu bar -->
  <rect x="46" y="26" width="308" height="13" fill="rgba(28,28,28,0.07)"/>
  <circle cx="58" cy="32" r="3" fill="#1C1C1C" opacity="0.18"/>
  <circle cx="70" cy="32" r="3" fill="#1C1C1C" opacity="0.18"/>
  <circle cx="82" cy="32" r="3" fill="#1C1C1C" opacity="0.18"/>
  <line x1="100" y1="32" x2="340" y2="32" stroke="#1C1C1C" stroke-width="0.3" opacity="0.1"/>

  <!-- Left tool panel -->
  <rect x="46" y="39" width="20" height="167" fill="rgba(28,28,28,0.05)"/>
  <rect x="49" y="44" width="14" height="10" stroke="#B8976A" stroke-width="0.7" fill="none" opacity="0.55"/>
  <rect x="49" y="58" width="14" height="10" stroke="#1C1C1C" stroke-width="0.4" fill="none" opacity="0.22"/>
  <rect x="49" y="72" width="14" height="10" stroke="#1C1C1C" stroke-width="0.4" fill="none" opacity="0.22"/>
  <circle cx="56" cy="92" r="5" stroke="#1C1C1C" stroke-width="0.4" fill="none" opacity="0.2"/>
  <line x1="49" y1="107" x2="63" y2="107" stroke="#1C1C1C" stroke-width="0.4" opacity="0.18"/>
  <line x1="49" y1="113" x2="58" y2="113" stroke="#1C1C1C" stroke-width="0.4" opacity="0.18"/>

  <!-- Drawing viewport -->
  <!-- Front view of mechanical part -->
  <rect x="96" y="50" width="110" height="95" stroke="#1C1C1C" stroke-width="1" fill="none"/>
  <!-- Hidden lines -->
  <line x1="116" y1="50" x2="116" y2="145" stroke="#1C1C1C" stroke-width="0.5" stroke-dasharray="3,2" opacity="0.3"/>
  <line x1="186" y1="50" x2="186" y2="145" stroke="#1C1C1C" stroke-width="0.5" stroke-dasharray="3,2" opacity="0.3"/>
  <!-- Hole features -->
  <circle cx="151" cy="97" r="22" stroke="#1C1C1C" stroke-width="0.8" fill="none" opacity="0.6"/>
  <circle cx="151" cy="97" r="10" stroke="#1C1C1C" stroke-width="0.5" stroke-dasharray="3,2" fill="none" opacity="0.35"/>
  <!-- Center marks -->
  <line x1="151" y1="44" x2="151" y2="54" stroke="#1C1C1C" stroke-width="0.5" stroke-dasharray="3,1" opacity="0.5"/>
  <line x1="145" y1="97" x2="157" y2="97" stroke="#1C1C1C" stroke-width="0.5" stroke-dasharray="3,1" opacity="0.5"/>
  <line x1="151" y1="91" x2="151" y2="103" stroke="#1C1C1C" stroke-width="0.5" stroke-dasharray="3,1" opacity="0.5"/>

  <!-- Side/section view -->
  <rect x="228" y="50" width="58" height="95" stroke="#1C1C1C" stroke-width="1" fill="none"/>
  <!-- Section hatching -->
  <line x1="228" y1="60" x2="240" y2="50" stroke="#1C1C1C" stroke-width="0.4" opacity="0.22"/>
  <line x1="228" y1="74" x2="254" y2="50" stroke="#1C1C1C" stroke-width="0.4" opacity="0.22"/>
  <line x1="228" y1="88" x2="268" y2="50" stroke="#1C1C1C" stroke-width="0.4" opacity="0.22"/>
  <line x1="228" y1="102" x2="286" y2="46" stroke="#1C1C1C" stroke-width="0.4" opacity="0.22"/>
  <line x1="228" y1="116" x2="286" y2="60" stroke="#1C1C1C" stroke-width="0.4" opacity="0.22"/>
  <line x1="228" y1="130" x2="286" y2="74" stroke="#1C1C1C" stroke-width="0.4" opacity="0.22"/>
  <line x1="234" y1="145" x2="286" y2="93" stroke="#1C1C1C" stroke-width="0.4" opacity="0.22"/>
  <line x1="248" y1="145" x2="286" y2="107" stroke="#1C1C1C" stroke-width="0.4" opacity="0.22"/>
  <line x1="262" y1="145" x2="286" y2="121" stroke="#1C1C1C" stroke-width="0.4" opacity="0.22"/>
  <line x1="276" y1="145" x2="286" y2="135" stroke="#1C1C1C" stroke-width="0.4" opacity="0.22"/>

  <!-- Dimension lines (gold) -->
  <line x1="96" y1="38" x2="206" y2="38" stroke="#B8976A" stroke-width="0.7"/>
  <line x1="96" y1="33" x2="96" y2="43" stroke="#B8976A" stroke-width="0.7"/>
  <line x1="206" y1="33" x2="206" y2="43" stroke="#B8976A" stroke-width="0.7"/>
  <text x="151" y="33" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="8" fill="#B8976A">110</text>

  <line x1="82" y1="50" x2="82" y2="145" stroke="#B8976A" stroke-width="0.7"/>
  <line x1="77" y1="50" x2="87" y2="50" stroke="#B8976A" stroke-width="0.7"/>
  <line x1="77" y1="145" x2="87" y2="145" stroke="#B8976A" stroke-width="0.7"/>
  <text x="72" y="101" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="8" fill="#B8976A" transform="rotate(-90,72,101)">95</text>

  <!-- Diameter annotation -->
  <line x1="156" y1="80" x2="172" y2="68" stroke="#B8976A" stroke-width="0.6" opacity="0.7"/>
  <text x="180" y="65" font-family="DM Sans,sans-serif" font-size="8" fill="#B8976A" opacity="0.85">Ø44</text>

  <!-- Title block bottom -->
  <rect x="46" y="160" width="308" height="46" stroke="#1C1C1C" stroke-width="0.4" fill="rgba(28,28,28,0.02)" opacity="0.5"/>
  <line x1="200" y1="160" x2="200" y2="206" stroke="#1C1C1C" stroke-width="0.4" opacity="0.3"/>
  <line x1="46" y1="178" x2="354" y2="178" stroke="#1C1C1C" stroke-width="0.4" opacity="0.2"/>
  <text x="123" y="172" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="7" fill="#1C1C1C" opacity="0.38">DESIGN LOVER — 長野</text>
  <text x="277" y="172" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="7" fill="#B8976A" opacity="0.65">DL-2024-001</text>
  <text x="123" y="192" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="6.5" fill="#1C1C1C" opacity="0.28">BRACKET — FRONT &amp; SECTION</text>
  <text x="277" y="186" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="6.5" fill="#1C1C1C" opacity="0.28">SCALE 1:1</text>
  <text x="277" y="196" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="6.5" fill="#1C1C1C" opacity="0.28">SolidWorks 2024</text>

  <!-- Title -->
  <line x1="12" y1="228" x2="388" y2="228" stroke="#1C1C1C" stroke-width="0.4" opacity="0.18"/>
  <text x="200" y="246" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="7.5" fill="#7A7772" letter-spacing="2.5" opacity="0.9">CAD DRAWING — SolidWorks</text>
</svg>
