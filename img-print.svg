  <circle cx="200" cy="133" r="2.5" fill="#B8976A" opacity="0.8"/>

  <!-- Filament path -->
  <path d="M200 74 Q226 74 226 90 L226 100" stroke="#B8976A" stroke-width="1" stroke-dasharray="3,2" fill="none" opacity="0.5"/>
  <!-- Filament spool hint -->
  <circle cx="226" cy="66" r="10" stroke="#B8976A" stroke-width="0.7" fill="none" opacity="0.35"/>
  <circle cx="226" cy="66" r="4" stroke="#1C1C1C" stroke-width="0.5" fill="none" opacity="0.25"/>

  <!-- Build plate -->
  <rect x="92" y="207" width="216" height="10" stroke="#1C1C1C" stroke-width="0.8" fill="rgba(28,28,28,0.07)"/>
  <!-- Grid on plate -->
  <line x1="112" y1="207" x2="112" y2="217" stroke="#1C1C1C" stroke-width="0.3" opacity="0.2"/>
  <line x1="132" y1="207" x2="132" y2="217" stroke="#1C1C1C" stroke-width="0.3" opacity="0.2"/>
  <line x1="152" y1="207" x2="152" y2="217" stroke="#1C1C1C" stroke-width="0.3" opacity="0.2"/>
  <line x1="172" y1="207" x2="172" y2="217" stroke="#1C1C1C" stroke-width="0.3" opacity="0.2"/>
  <line x1="200" y1="207" x2="200" y2="217" stroke="#1C1C1C" stroke-width="0.3" opacity="0.2"/>
  <line x1="228" y1="207" x2="228" y2="217" stroke="#1C1C1C" stroke-width="0.3" opacity="0.2"/>
  <line x1="248" y1="207" x2="248" y2="217" stroke="#1C1C1C" stroke-width="0.3" opacity="0.2"/>
  <line x1="268" y1="207" x2="268" y2="217" stroke="#1C1C1C" stroke-width="0.3" opacity="0.2"/>
  <line x1="288" y1="207" x2="288" y2="217" stroke="#1C1C1C" stroke-width="0.3" opacity="0.2"/>

  <!-- Printed object — layered build -->
  <rect x="158" y="199" width="84" height="8" fill="#B8976A" opacity="0.40" stroke="#B8976A" stroke-width="0.3"/>
  <rect x="161" y="191" width="78" height="8" fill="#B8976A" opacity="0.35" stroke="#B8976A" stroke-width="0.3"/>
  <rect x="164" y="183" width="72" height="8" fill="#B8976A" opacity="0.30" stroke="#B8976A" stroke-width="0.3"/>
  <rect x="167" y="175" width="66" height="8" fill="#B8976A" opacity="0.26" stroke="#B8976A" stroke-width="0.3"/>
  <rect x="170" y="167" width="60" height="8" fill="#B8976A" opacity="0.22" stroke="#B8976A" stroke-width="0.3"/>
  <rect x="173" y="159" width="54" height="8" fill="#B8976A" opacity="0.18" stroke="#B8976A" stroke-width="0.3"/>
  <rect x="176" y="151" width="48" height="8" fill="#B8976A" opacity="0.15" stroke="#B8976A" stroke-width="0.3"/>
  <rect x="179" y="143" width="42" height="8" fill="#B8976A" opacity="0.12" stroke="#B8976A" stroke-width="0.3"/>
  <rect x="182" y="135" width="36" height="8" fill="#B8976A" opacity="0.09" stroke="#B8976A" stroke-width="0.4" stroke-dasharray="2,2"/>

  <!-- Z axis arrow -->
  <line x1="346" y1="145" x2="346" y2="207" stroke="#B8976A" stroke-width="0.9" opacity="0.6"/>
  <polygon points="342,147 346,138 350,147" fill="#B8976A" opacity="0.6"/>
  <text x="354" y="180" font-family="DM Sans,sans-serif" font-size="9" fill="#B8976A" opacity="0.7" letter-spacing="0.5">Z</text>

  <!-- Layer height annotation -->
  <line x1="135" y1="199" x2="135" y2="207" stroke="#B8976A" stroke-width="0.6" opacity="0.5"/>
  <line x1="135" y1="191" x2="135" y2="199" stroke="#B8976A" stroke-width="0.6" opacity="0.4"/>
  <line x1="130" y1="191" x2="140" y2="191" stroke="#B8976A" stroke-width="0.6" opacity="0.4"/>
  <line x1="130" y1="199" x2="140" y2="199" stroke="#B8976A" stroke-width="0.6" opacity="0.4"/>
  <text x="108" y="196" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="7" fill="#B8976A" opacity="0.7">0.2mm</text>

  <!-- Title -->
  <line x1="12" y1="228" x2="388" y2="228" stroke="#1C1C1C" stroke-width="0.4" opacity="0.18"/>
  <text x="200" y="246" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="7.5" fill="#7A7772" letter-spacing="2.5" opacity="0.9">FDM 3D PRINTER — SECTION VIEW</text>
</svg>
