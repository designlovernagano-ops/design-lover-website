  <line x1="75" y1="22" x2="325" y2="22" stroke="#1C1C1C" stroke-width="0.5"/>

  <!-- Vertical guide rails -->
  <rect x="83" y="36" width="10" height="191" fill="rgba(28,28,28,0.08)" stroke="#1C1C1C" stroke-width="0.5"/>
  <rect x="307" y="36" width="10" height="191" fill="rgba(28,28,28,0.08)" stroke="#1C1C1C" stroke-width="0.5"/>
  <!-- Rail texture -->
  <line x1="88" y1="50" x2="88" y2="60" stroke="#B8976A" stroke-width="0.5" opacity="0.4"/>
  <line x1="88" y1="70" x2="88" y2="80" stroke="#B8976A" stroke-width="0.5" opacity="0.4"/>
  <line x1="88" y1="90" x2="88" y2="100" stroke="#B8976A" stroke-width="0.5" opacity="0.4"/>
  <line x1="312" y1="50" x2="312" y2="60" stroke="#B8976A" stroke-width="0.5" opacity="0.4"/>
  <line x1="312" y1="70" x2="312" y2="80" stroke="#B8976A" stroke-width="0.5" opacity="0.4"/>
  <line x1="312" y1="90" x2="312" y2="100" stroke="#B8976A" stroke-width="0.5" opacity="0.4"/>

  <!-- X axis carriage rail -->
  <rect x="93" y="98" width="214" height="8" fill="rgba(28,28,28,0.1)" stroke="#1C1C1C" stroke-width="0.7"/>

  <!-- Print head / extruder -->
  <rect x="176" y="88" width="48" height="26" stroke="#1C1C1C" stroke-width="1" fill="rgba(28,28,28,0.06)"/>
  <rect x="183" y="114" width="34" height="8" stroke="#1C1C1C" stroke-width="0.7" fill="rgba(28,28,28,0.04)"/>
  <!-- Hot end -->
  <polygon points="195,122 205,122 202,132 198,132" stroke="#1C1C1C" stroke-width="0.8" fill="rgba(184,151,106,0.4)"/>
